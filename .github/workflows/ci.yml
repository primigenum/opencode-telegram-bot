name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        # Run each test file in its own bun process. mock.module is
        # process-global in bun, so two test files that mock the same
        # source module would otherwise pollute each other. Some tests
        # that use vi.useFakeTimers need more time on shared runners.
        timeout-minutes: 15
        run: |
          set +e
          mkdir -p test-logs
          overall_status=0
          for f in $(find tests -name "*.test.ts" | sort); do
            name=$(basename "$f" .test.ts)
            log="test-logs/${name}.log"
            echo "=== $f ==="
            timeout 120 bun test "$f" 2>&1 | tee "$log"
            status=${PIPESTATUS[0]}
            if [ $status -ne 0 ]; then
              echo "FAILED: $f (exit $status)"
              overall_status=1
            fi
          done
          echo "---"
          awk -F/ '/^Results:/ {print}' test-logs/*.log | sort | uniq -c
          exit $overall_status

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-logs/
          retention-days: 7
          if-no-files-found: ignore
