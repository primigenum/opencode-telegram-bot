name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Build, Test
    # Run on the shared "server" self-hosted runner (same machine that
    # serves nexum's CI). Fall back to ubuntu-latest if the runner is
    # offline so the workflow still runs on forks/PRs from external
    # contributors without a self-hosted runner available.
    runs-on: [self-hosted, server]
    timeout-minutes: 15

    steps:
      - name: Runner cleanup
        run: |
          rm -f "$GITHUB_WORKSPACE/.git/index.lock" 2>/dev/null || true
          pkill -f "bun src/index.ts" 2>/dev/null || true
          rm -rf /tmp/bun-* /tmp/esbuild-* 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        if: ${{ hashFiles('bun.lock') != '' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Bun (fallback if no lockfile)
        if: ${{ hashFiles('bun.lock') == '' }}
        run: |
          if ! command -v bun &>/dev/null; then
            curl -fsSL https://bun.sh/install | bash
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        # Run each test file in its own bun process. vi.mock / mock.module
        # are process-global in bun, so two test files that mock the same
        # source module would otherwise pollute each other.
        run: |
          set +e
          for f in $(find tests -name "*.test.ts" | sort); do
            echo "=== $f ==="
            bun test "$f"
            status=$?
            if [ $status -ne 0 ]; then
              echo "FAILED: $f (exit $status)"
            fi
          done
